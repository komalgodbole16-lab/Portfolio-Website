<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="contact">
      <h1>Contact Me</h1>
     </div>  
    <div class="contact-description">
        Feel free to message me for projects or collaboration.
    </div>
    <div class="form-box">
    <div class="form">
        <form>
            <div class="heading">
                Name:
                <input type="text" size="35">
                <br>
            </div>    
            <div class="heading">    
                Email:
                <input type="email"  size="35">
            </div>
            <div class="heading">
                Message:
                <input type="text"  class="msg" size="30">
            </div>
            <a href="#" class="button">Send Message</a>
        </form>
    </div>
    </div>
</body>
</html>
